<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Fighters - LLM Fight Club</title>
    <link rel="stylesheet" href="css/global.css">

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(ellipse at center top, #1e90ff 0%, #0a4a8a 30%, #052a50 60%, #011627 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Scanline overlay for retro effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.1) 0px,
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 3px);
            pointer-events: none;
            z-index: 100;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at center, rgba(30, 144, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 20% 20%, rgba(100, 180, 255, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 30%, rgba(100, 180, 255, 0.15) 0%, transparent 30%);
            pointer-events: none;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: 100px;
        }

        .choose-header {
            margin-top: 5vh;
            margin-bottom: 4vh;
            z-index: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .choose-header img {
            max-width: 320px;
            width: 65vw;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(30, 144, 255, 0.6));
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .selection-area {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            width: 100%;
            max-width: 850px;
            padding: 20px;
            z-index: 1;
        }

        .player-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 140px;
        }

        .player-list-scroll {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 10px 15px;
            width: 100%;
        }

        .player-list-scroll::-webkit-scrollbar {
            width: 14px;
        }

        .player-list-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #4a4a8a;
        }

        .player-list-scroll::-webkit-scrollbar-thumb {
            background: #4a4a8a;
            border: 2px solid #1e90ff;
            cursor: pointer;
        }

        .player-list-scroll::-webkit-scrollbar-thumb:hover {
            background: #ffcc00;
            border-color: #fff;
        }

        .player-side h3 {
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #fff;
            margin: 0 0 12px 0;
            text-shadow: 2px 2px 0 #000, 4px 4px 0 rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .player-btn {
            background: linear-gradient(180deg, rgba(40, 40, 80, 0.8) 0%, rgba(20, 20, 40, 0.9) 100%);
            border: 3px solid #4a4a8a;
            padding: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-radius: 0;
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.2),
                inset -2px -2px 0 rgba(0, 0, 0, 0.4),
                3px 3px 0 rgba(0, 0, 0, 0.5);
        }

        .player-btn img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .player-btn:hover {
            border-color: #ffcc00;
            transform: translate(-2px, -2px);
            background: linear-gradient(180deg, rgba(80, 60, 20, 0.9) 0%, rgba(40, 30, 10, 0.9) 100%);
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.3),
                inset -2px -2px 0 rgba(0, 0, 0, 0.4),
                5px 5px 0 rgba(0, 0, 0, 0.5);
        }

        .player-btn.selected {
            border-color: #00ff00;
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.3),
                inset -2px -2px 0 rgba(0, 0, 0, 0.4),
                0 0 15px rgba(0, 255, 0, 0.6),
                3px 3px 0 rgba(0, 100, 0, 0.8);
            background: linear-gradient(180deg, rgba(0, 80, 0, 0.8) 0%, rgba(0, 40, 0, 0.9) 100%);
        }

        .player-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .vs-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 28px;
            color: #ff0040;
            text-shadow:
                3px 3px 0 #800020,
                5px 5px 0 #000,
                0 0 25px rgba(255, 0, 64, 0.8);
            padding: 0 15px;
            animation: vsPulse 1s ease-in-out infinite;
            align-self: center;
            margin-top: 160px;
        }

        @keyframes vsPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .done-btn {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #33cc33 0%, #22aa22 50%, #118811 100%);
            border: 3px solid #005500;
            padding: 10px 30px;
            cursor: pointer;
            z-index: 10;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            transition: all 0.15s ease;
            opacity: 0.5;
            pointer-events: none;
            border-radius: 0;
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.3),
                inset -2px -2px 0 rgba(0, 0, 0, 0.4),
                4px 4px 0 rgba(0, 0, 0, 0.6);
        }

        .done-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .done-btn.active:hover {
            background: linear-gradient(180deg, #44dd44 0%, #33cc33 50%, #22aa22 100%);
            transform: translateX(-50%) translate(-2px, -2px);
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.4),
                inset -2px -2px 0 rgba(0, 0, 0, 0.4),
                6px 6px 0 rgba(0, 0, 0, 0.6);
        }

        /* Pixel Transition Overlay */
        .pixel-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: all;
        }

        .pixel-transition-overlay canvas {
            width: 100%;
            height: 100%;
        }

        .transition-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 48px;
            color: #fff;
            text-shadow:
                4px 4px 0 #ff0040,
                8px 8px 0 #000,
                0 0 50px rgba(255, 204, 0, 0.8);
            opacity: 0;
            z-index: 10000;
            transition: opacity 0.3s ease;
        }

        .transition-text.show {
            opacity: 1;
            animation: fightTextPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes fightTextPulse {
            from {
                transform: translate(-50%, -50%) scale(1);
            }

            to {
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        /* Name Input Popup Modal */
        .name-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .name-popup-box {
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1e 100%);
            border: 3px solid #4af;
            box-shadow: 0 0 30px rgba(68, 170, 255, 0.5), inset 0 0 20px rgba(68, 170, 255, 0.1);
            padding: 25px 35px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .name-popup-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
        }

        .name-popup-character {
            margin-bottom: 15px;
        }

        .name-popup-character img {
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        .name-popup-model {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #aaa;
            margin-top: 8px;
        }

        .name-popup-input {
            width: 100%;
            padding: 12px 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #111;
            border: 2px solid #4af;
            color: #fff;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .name-popup-input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .name-popup-input::placeholder {
            color: #666;
        }

        .name-popup-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .name-popup-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 20px;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.15s ease;
        }

        .name-popup-btn.confirm {
            background: linear-gradient(180deg, #33cc33 0%, #22aa22 100%);
            border-color: #005500;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }

        .name-popup-btn.confirm:hover {
            background: linear-gradient(180deg, #44dd44 0%, #33cc33 100%);
            transform: scale(1.05);
        }

        .name-popup-btn.cancel {
            background: linear-gradient(180deg, #666 0%, #444 100%);
            border-color: #333;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }

        .name-popup-btn.cancel:hover {
            background: linear-gradient(180deg, #777 0%, #555 100%);
            transform: scale(1.05);
        }

        .player-custom-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #4af;
            margin-top: 4px;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <audio id="bell-sound" src="assets/sounds/bell.mp3"></audio>
    <audio id="click-sound" src="assets/sounds/click.mp3"></audio>

    <!-- Load React Components -->
    <script src="js/PixelTransition.js"></script>

    <script>
        const { useState, useEffect, useRef, useCallback } = React;

        const FALLBACK_MODELS = {
            '1': { name: 'Qwen 3.5', color: '#ffffff', provider: 'ollama', skin_id: '1' },
            '2': { name: 'Groq Llama 3.3 70B', color: '#f55036', provider: 'groq', skin_id: '2' },
            '3': { name: 'Qwen3 Coder Next', color: '#6ef2ff', provider: 'ollama', skin_id: '3' },
            '4': { name: 'Groq Llama 3.1 8B', color: '#ffb347', provider: 'groq', skin_id: '4' }
        };

        const API_BASE = window.location.origin.startsWith('http')
            ? window.location.origin
            : 'http://localhost:5000';

        function PlayerButton({ fighterId, model, selected, disabled, onClick, customName }) {
            const className = `player-btn ${selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
            const skinId = model.skin_id || fighterId;
            return React.createElement('div', { style: { textAlign: 'center', maxWidth: '90px' } }, [
                React.createElement('button', {
                    key: `btn-${fighterId}`,
                    className,
                    'data-player': fighterId,
                    onClick: () => !disabled && onClick(fighterId)
                },
                    React.createElement('img', {
                        src: `assets/images/characters/player${skinId}.png`,
                        alt: model.name
                    })
                ),
                customName && React.createElement('div', {
                    key: `custom-${fighterId}`,
                    className: 'player-custom-name'
                }, customName),
                React.createElement('div', {
                    key: `label-${fighterId}`,
                    style: {
                        fontSize: '7px',
                        color: model.color || '#fff',
                        marginTop: '4px',
                        fontFamily: 'Press Start 2P, monospace',
                        textShadow: '1px 1px 0 #000',
                        lineHeight: '1.45'
                    }
                }, model.name),
                React.createElement('div', {
                    key: `provider-${fighterId}`,
                    style: {
                        fontSize: '6px',
                        color: '#b8cffd',
                        marginTop: '4px',
                        fontFamily: 'Press Start 2P, monospace',
                        lineHeight: '1.4'
                    }
                }, (model.provider || '').toUpperCase())
            ]);
        }

        function PlayerSide({ title, id, players, models, selectedPlayer, disabledPlayer, onSelect, customName }) {
            return React.createElement('div', { className: 'player-side', id }, [
                React.createElement('h3', { key: 'title' }, title),
                React.createElement('div', { className: 'player-list-scroll', key: 'list' },
                    players.map((fighterId) =>
                        React.createElement(PlayerButton, {
                            key: fighterId,
                            fighterId,
                            model: models[fighterId],
                            selected: selectedPlayer === fighterId,
                            disabled: disabledPlayer === fighterId,
                            onClick: onSelect,
                            customName: selectedPlayer === fighterId ? customName : null
                        })
                    )
                )
            ]);
        }

        function NamePopup({ side, model, skinId, onConfirm, onCancel }) {
            const [name, setName] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                if (inputRef.current) {
                    inputRef.current.focus();
                }
            }, []);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && name.trim()) {
                    onConfirm(name.trim());
                } else if (e.key === 'Escape') {
                    onCancel();
                }
            };

            return React.createElement('div', { className: 'name-popup-overlay' },
                React.createElement('div', { className: 'name-popup-box' }, [
                    React.createElement('div', { key: 'title', className: 'name-popup-title' },
                        `ENTER ${side === 'left' ? 'PLAYER 1' : 'PLAYER 2'} NAME`
                    ),
                    React.createElement('div', { key: 'char', className: 'name-popup-character' }, [
                        React.createElement('img', {
                            key: 'img',
                            src: `assets/images/characters/player${skinId}.png`,
                            alt: model.name
                        }),
                        React.createElement('div', { key: 'model', className: 'name-popup-model' }, model.name)
                    ]),
                    React.createElement('input', {
                        key: 'input',
                        ref: inputRef,
                        type: 'text',
                        className: 'name-popup-input',
                        placeholder: 'Your name...',
                        value: name,
                        onChange: (e) => setName(e.target.value.slice(0, 20)),
                        onKeyDown: handleKeyDown,
                        maxLength: 20
                    }),
                    React.createElement('div', { key: 'buttons', className: 'name-popup-buttons' }, [
                        React.createElement('button', {
                            key: 'cancel',
                            className: 'name-popup-btn cancel',
                            onClick: onCancel
                        }, 'CANCEL'),
                        React.createElement('button', {
                            key: 'confirm',
                            className: 'name-popup-btn confirm',
                            onClick: () => name.trim() && onConfirm(name.trim()),
                            disabled: !name.trim()
                        }, 'CONFIRM')
                    ])
                ])
            );
        }

        function SelectionApp() {
            const [models, setModels] = useState(FALLBACK_MODELS);
            const [leftSelected, setLeftSelected] = useState(null);
            const [rightSelected, setRightSelected] = useState(null);
            const [leftName, setLeftName] = useState('');
            const [rightName, setRightName] = useState('');
            const [popupSide, setPopupSide] = useState(null);
            const [pendingSelection, setPendingSelection] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);
            
            // Custom Model States
            const [showCustomModal, setShowCustomModal] = useState(false);
            const [customModelData, setCustomModelData] = useState({
                name: '', provider: 'groq', model_id: '', api_key: ''
            });

            const clickSoundRef = useRef(null);
            const bellSoundRef = useRef(null);

            const fetchModels = useCallback(() => {
                fetch(`${API_BASE}/api/models`)
                    .then(response => response.ok ? response.json() : Promise.reject())
                    .then(data => { if (data && Object.keys(data).length) setModels(data); })
                    .catch(() => {});
            }, []);

            useEffect(() => {
                clickSoundRef.current = document.getElementById('click-sound');
                bellSoundRef.current = document.getElementById('bell-sound');
                fetchModels();
            }, [fetchModels]);

            const handleCustomModelSubmit = useCallback(() => {
                if (!customModelData.name || !customModelData.model_id) return;
                
                fetch(`${API_BASE}/api/custom_model`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customModelData)
                })
                .then(res => res.json())
                .then(data => {
                    setShowCustomModal(false);
                    setCustomModelData({ name: '', provider: 'groq', model_id: '', api_key: '' });
                    fetchModels(); // Refresh available models
                });
            }, [customModelData, fetchModels]);

            const playClick = useCallback(() => {
                if (clickSoundRef.current) {
                    clickSoundRef.current.currentTime = 0;
                    clickSoundRef.current.play().catch(() => { });
                }
            }, []);

            const handleLeftSelect = useCallback((fighterId) => {
                playClick();
                setPendingSelection(fighterId);
                setPopupSide('left');
            }, [playClick]);

            const handleRightSelect = useCallback((fighterId) => {
                playClick();
                setPendingSelection(fighterId);
                setPopupSide('right');
            }, [playClick]);

            const handleNameConfirm = useCallback((name) => {
                if (popupSide === 'left') {
                    setLeftSelected(pendingSelection);
                    setLeftName(name);
                    if (rightSelected === pendingSelection) {
                        setRightSelected(null);
                        setRightName('');
                    }
                } else {
                    setRightSelected(pendingSelection);
                    setRightName(name);
                }
                setPopupSide(null);
                setPendingSelection(null);
            }, [popupSide, pendingSelection, rightSelected]);

            const handleNameCancel = useCallback(() => {
                setPopupSide(null);
                setPendingSelection(null);
            }, []);

            const handleStartFight = useCallback(() => {
                if (leftSelected && rightSelected) {
                    playClick();
                    if (bellSoundRef.current) {
                        bellSoundRef.current.play().catch(() => { });
                    }
                    setIsTransitioning(true);
                }
            }, [leftSelected, rightSelected, playClick]);

            const handleTransitionComplete = useCallback(() => {
                const params = new URLSearchParams({
                    p1: leftSelected,
                    p2: rightSelected,
                    p1name: leftName,
                    p2name: rightName
                });
                window.location.href = `arena-ai.html?${params.toString()}`;
            }, [leftSelected, rightSelected, leftName, rightName]);

            const players = Object.keys(models).sort((a, b) => Number(a) - Number(b));
            const isDoneActive = Boolean(leftSelected && rightSelected);

            return React.createElement(React.Fragment, null, [
                showCustomModal && React.createElement('div', { key: 'custom-modal', className: 'name-popup-overlay' },
                    React.createElement('div', { className: 'name-popup-box', style: { maxWidth: '450px' } }, [
                        React.createElement('div', { key: 'title', className: 'name-popup-title' }, 'ADD CUSTOM LLM (SESSION)'),
                        React.createElement('input', {
                            key: 'mname', className: 'name-popup-input', placeholder: 'Display Name (e.g. GPT-4o)',
                            value: customModelData.name, onChange: e => setCustomModelData({...customModelData, name: e.target.value})
                        }),
                        React.createElement('select', {
                            key: 'mprov', className: 'name-popup-input', style: { appearance: 'none' },
                            value: customModelData.provider, onChange: e => setCustomModelData({...customModelData, provider: e.target.value})
                        }, [
                            React.createElement('option', { key: 'g', value: 'groq' }, 'Groq API'),
                            React.createElement('option', { key: 'o', value: 'ollama' }, 'Ollama Local')
                        ]),
                        React.createElement('input', {
                            key: 'mid', className: 'name-popup-input', placeholder: 'Model ID (e.g. llama3-70b)',
                            value: customModelData.model_id, onChange: e => setCustomModelData({...customModelData, model_id: e.target.value})
                        }),
                        React.createElement('input', {
                            key: 'mkey', className: 'name-popup-input', placeholder: 'API Key (Optional for Groq)', type: 'password',
                            value: customModelData.api_key, onChange: e => setCustomModelData({...customModelData, api_key: e.target.value})
                        }),
                        React.createElement('div', { key: 'btns', className: 'name-popup-buttons' }, [
                            React.createElement('button', { key: 'c', className: 'name-popup-btn cancel', onClick: () => setShowCustomModal(false) }, 'CANCEL'),
                            React.createElement('button', { key: 's', className: 'name-popup-btn confirm', onClick: handleCustomModelSubmit }, 'ADD MODEL')
                        ])
                    ])
                ),
                popupSide && pendingSelection && React.createElement(NamePopup, {
                    key: 'popup',
                    side: popupSide,
                    model: models[pendingSelection],
                    skinId: models[pendingSelection].skin_id || pendingSelection,
                    onConfirm: handleNameConfirm,
                    onCancel: handleNameCancel
                }),
                React.createElement('div', { key: 'header', className: 'choose-header' },
                    React.createElement('img', {
                        src: 'assets/images/landing/choose.png',
                        alt: 'Choose Your Fighter'
                    }),
                    React.createElement('button', {
                        style: {
                            position: 'absolute', top: '10px', right: '10px', background: '#33cc33', color: '#fff', border: '2px solid #005500', fontFamily: 'Press Start 2P', fontSize: '8px', padding: '8px', cursor: 'pointer', zIndex: 100
                        },
                        onClick: () => setShowCustomModal(true)
                    }, 'ADD CUSTOM MODEL')
                ),
                React.createElement('div', { key: 'selection', className: 'selection-area' }, [
                    React.createElement(PlayerSide, {
                        key: 'left',
                        title: 'PLAYER 1',
                        id: 'left-side',
                        players,
                        models,
                        selectedPlayer: leftSelected,
                        disabledPlayer: null,
                        onSelect: handleLeftSelect,
                        customName: leftName
                    }),
                    React.createElement('div', { key: 'vs', className: 'vs-text' }, 'VS'),
                    React.createElement(PlayerSide, {
                        key: 'right',
                        title: 'PLAYER 2',
                        id: 'right-side',
                        players,
                        models,
                        selectedPlayer: rightSelected,
                        disabledPlayer: leftSelected,
                        onSelect: handleRightSelect,
                        customName: rightName
                    })
                ]),
                React.createElement('button', {
                    key: 'done',
                    className: `done-btn ${isDoneActive ? 'active' : ''}`,
                    onClick: handleStartFight
                }, 'FIGHT!'),
                React.createElement(PixelTransition, {
                    key: 'transition',
                    isActive: isTransitioning,
                    onComplete: handleTransitionComplete,
                    text: 'FIGHT!'
                })
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(SelectionApp));
    </script>
</body>

</html>
