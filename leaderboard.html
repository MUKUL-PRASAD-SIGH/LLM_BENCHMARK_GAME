<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Fight Club - Leaderboard</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            background-color: #0d0d1a;
            color: #fff;
            font-family: 'Press Start 2P', monospace, sans-serif;
            text-align: center;
        }
        h1 { color: #ffeb3b; text-shadow: 2px 2px #ff0000; margin-top: 50px; }
        .leaderboard-container {
            max-width: 900px;
            margin: 40px auto;
            background: #111;
            border: 2px solid #4af;
            box-shadow: 0 0 15px #4af;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        th { color: #4af; font-size: 0.8rem; }
        td { font-size: 0.7rem; font-family: monospace; }
        .rank-1 td { color: #ffd700; font-weight: bold; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; }
        .rank-2 td { color: #c0c0c0; font-weight: bold; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; }
        .rank-3 td { color: #cd7f32; font-weight: bold; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; }
        button.back-btn {
            background: #4af; color: #000;
            border: 2px solid #fff; padding: 10px 20px;
            font-family: inherit; font-size: 0.8rem;
            cursor: pointer; margin-top: 30px;
        }
        button.back-btn:hover { background: #7df; }
    </style>
</head>
<body>
    <h1>GLOBAL LEADERBOARD</h1>
    
    <div class="leaderboard-container">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Model</th>
                    <th>Intel Score</th>
                    <th>Wins - Losses</th>
                    <th>Prediction %</th>
                    <th>Reasoning</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="6">Loading rankings...</td></tr>
            </tbody>
        </table>
        
        <button class="back-btn" onclick="location.href='index.html'">BACK TO MENU</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';
                
                if (!data.models || data.models.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No documented fights yet! Play a match to seed the leaderboard.</td></tr>';
                    return;
                }
                
                data.models.forEach((model, index) => {
                    const row = document.createElement('tr');
                    
                    let rankIcon = `#${index + 1}`;
                    if (index === 0) { rankIcon = '🥇 1'; row.className = 'rank-1'; }
                    else if (index === 1) { rankIcon = '🥈 2'; row.className = 'rank-2'; }
                    else if (index === 2) { rankIcon = '🥉 3'; row.className = 'rank-3'; }
                    
                    row.innerHTML = `
                        <td>${rankIcon}</td>
                        <td>${model.name.toUpperCase()}</td>
                        <td>${model.avg_score}</td>
                        <td>${model.wins}W - ${model.losses}L</td>
                        <td>${model.prediction_accuracy}%</td>
                        <td>${model.reasoning_quality}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error('Error fetching leaderboard:', err);
                document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="6" style="color:red">Failed to load leaderboard database. Is server running?</td></tr>';
            }
        });
    </script>
</body>
</html>
